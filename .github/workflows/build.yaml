#
# Workflow to build MeshProc
#
# Github run number is injected as build number value into the version number
#
# vcpkg is initialized and build explicitly, if no cached binaries are available
# Cache key is based on vcpkg-submodule, manifest file content, and compiler toolchain version
#
# After build, a small smoke test is run, testing generation and saving of a simple cube geometry (cf. test subdirectory)
#
# The built binaries are stored as pipeline artifacts
#

name: Build MeshProc

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        BUILD_TYPE: [Debug, Release, RelWithDebInfo]

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Set up MSVC Developer Command Prompt
      uses: ilammy/msvc-dev-cmd@v1        

    - name: Build vcpkg_cache_key
      id: build-vcpkg_cache_key
      working-directory: ${{env.GITHUB_WORKSPACE}}
      shell: pwsh
      run: |
        $toolset = Get-ChildItem "C:\Program Files\Microsoft Visual Studio\*\*\VC\Tools\MSVC\*" |
            Sort-Object Name -Descending |
            Select-Object -First 1 |
            Select-Object -ExpandProperty Name |
            Out-String -NoNewLine
        Write-Host "Toolset = $toolset"

        $winsdk = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\Include" |
            Sort-Object Name -Descending |
            Select-Object -First 1 |
            Select-Object -ExpandProperty Name |
            Out-String -NoNewLine
        Write-Host "WinSdk = $winsdk"

        $vcpkgJson = "${{hashFiles('vcpkg.json')}}"
        Write-Host "VcpkgJson = $vcpkgJson"

        $vcpkgFiles = "${{hashFiles('vcpkg/**')}}"
        Write-Host "VcpkgFiles = $vcpkgFiles"

        $vcpkg_cache_key = "$($vcpkgJson)_$($vcpkgFiles)_$($toolset)_$($winsdk)"
        Write-Host "vcpkg_cache_key = $vcpkg_cache_key"

        "vcpkg_cache_key=$vcpkg_cache_key" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

    - name: Cache vcpkg packages
      uses: actions/cache@v5
      with:
        path: vcpkg_installed
        key: meshproc_vcpkg_installed_${{ steps.build-vcpkg_cache_key.outputs.vcpkg_cache_key }}

    - name: Restore dependencies
      shell: pwsh
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: |
        .\restore-dependencies.ps1

    - name: Configure CMake
      run: cmake -S ${{ github.workspace }} -B ${{ github.workspace }}/build `
        -G Ninja `
        -DCMAKE_C_COMPILER=cl `
        -DCMAKE_CXX_COMPILER=cl `
        -DCMAKE_BUILD_TYPE=${{ matrix.BUILD_TYPE }} `
        -DMESHPROC_VERSION_BUILD=${{ github.run_number }}

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{matrix.BUILD_TYPE}}

    - name: Check Version Info
      shell: pwsh
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: |
        $version = (Get-Item .\build\src\MeshProc.exe).VersionInfo.FileVersion
        Write-Host "Version number: $version"
        Write-Output "FULL_VERSION_NUMBER=$version" >> $env:GITHUB_ENV

    - name: 🧪 Smoke Test
      working-directory: ${{env.GITHUB_WORKSPACE}}
      shell: pwsh
      run: |
        $exe = "${{env.GITHUB_WORKSPACE}}\build\src\MeshProc.exe"

        & '${{env.GITHUB_WORKSPACE}}\test\run-all.ps1' -exe:$exe -Verbose
        if ($LASTEXITCODE -ne 0) { throw }

    - name: Upload Artifacts
      uses: actions/upload-artifact@v7
      with:
        name: MeshProc-${{env.FULL_VERSION_NUMBER}}-${{matrix.BUILD_TYPE}}
        path: |
          build/src/*.exe
          build/src/*.dll
          !**/*.pdb
        if-no-files-found: error
